
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandAI Edge Studio</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .window-frame { width: 100%; max-width: 650px; height: 85vh; background: #161b22; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #30363d; }
        .status-header { padding: 14px; background: #0d1117; text-align: center; font-size: 0.85rem; color: #58a6ff; border-bottom: 1px solid #30363d; font-family: monospace; }
        .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        .bubble { padding: 12px 16px; border-radius: 8px; max-width: 85%; line-height: 1.5; font-size: 0.95rem; }
        .user-bubble { background: #1f6feb; color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .ai-bubble { background: #21262d; color: #c9d1d9; align-self: flex-start; border-bottom-left-radius: 0; border: 1px solid #30363d; }
        .control-bar { display: flex; padding: 14px; background: #0d1117; gap: 10px; border-top: 1px solid #30363d; }
        input { flex: 1; background: #21262d; border: 1px solid #30363d; padding: 12px; border-radius: 6px; color: white; outline: none; font-size: 0.95rem; }
        input:focus { border-color: #58a6ff; }
        button { background: #238636; color: white; border: none; padding: 0 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; border: 1px solid #30363d; }
    </style>
    <script type="module" src="./app.js"></script>
</head>
<body>

<div class="window-frame">
    <div class="status-header" id="progressTrack">Warming up WebGPU pipeline...</div>
    <div class="chat-area" id="screenOutput">
        <div class="bubble ai-bubble">Core Engine Ready. Once DeepSeek-1.5B compiles to your local browser GPU, we can test custom logic constraints.</div>
    </div>
    <div class="control-bar">
        <input type="text" id="userText" placeholder="Downloading parameters..." disabled>
        <button id="sendAction" disabled>Send</button>
    </div>
</div>

</body>
</html>
