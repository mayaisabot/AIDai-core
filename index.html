<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aid-AI - Local First Aid Assistant</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f8; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .chat-container { width: 100%; max-width: 600px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; overflow: hidden; }
        .header { background: #d9534f; color: white; padding: 15px; font-weight: bold; text-align: center; font-size: 1.2rem; }
        .status { background: #f8d7da; color: #721c24; text-align: center; padding: 8px; font-size: 0.9rem; border-bottom: 1px solid #f5c6cb; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .user-bubble { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-bubble { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #eee; background: #fff; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; outline: none; }
        button { background: #d9534f; color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #c9302c; }
        button:disabled, input:disabled { background: #e9ecef; color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">Aid-AI Assistant</div>
        <div id="progressTrack" class="status">Downloading Local AI Engine (WebGPU)...</div>
        <div id="screenOutput" class="chat-box"></div>
        
        <div class="input-area">
            <input type="text" id="userText" placeholder="Please wait for the model to load..." disabled>
            <button id="sendAction" disabled>Send</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>

</body>
</html>
